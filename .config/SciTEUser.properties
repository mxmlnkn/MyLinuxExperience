############## Latex styles ##############
# Without this tex.properties overwrites everything from latex.properties,
# because it's loaded later

file.patterns.latex=*.tex;*.sty
filter.latex=LaTeX (tex sty)|$(file.patterns.latex)|
lexer.$(file.patterns.latex)=latex

# LaTeX styles
# White space. Colors normal text inside $...$ or \newglossaryentry but not
# inside other thigns like \caption, ... Oo???
# e.g. it colors '{hi}' and '_' in $\alpha_\mathrm{hi}$
style.latex.0=$(colour.text)
# Command
style.latex.1=$(colour.keyword)
# Tag Opening: This colors the '{align}' in \begin{align}
style.latex.2=$(colour.number)
# Math Inline (No... normal text!)
style.latex.3=$(colour.text)
# Comment (starting with %)
style.latex.4=$(colour.comment)
# Tag Closing: This colors the '{align}' in \end{align}
style.latex.5=$(style.latex.2)
# Math Block. Everything inside \begin{align} and \end{align}
# unfortunately at least as background this is unusable because
# other styles especially style.latex.1 overwrite the background, even
# if not specified explicitely, partially, making it look ragged
# same for style.latex.9
# Although this would be very helpful, because if there is a missing $, then
# the following align blocks won't be colored!
style.latex.6=
#back:#333333,eolfilled
# Comment Block ???
style.latex.7=$(colour.comment)
# Verbatim Segment ???
style.latex.8=fore:#666666
# Short Command \\ and $
style.latex.9=$(colour.number)
# Special Char, e.g. \%
style.latex.10=$(colour.keyword)
# Command optional argument, e.g. [width=\linewidth]
style.latex.11=$(colour.number)
# Syntax error
style.latex.12=$(colour.error)
# Matching braces if cursors is besides one
style.latex.34=$(colour.number),bold


############## Perl styles ##############

style.perl.32=
# White space
style.perl.0=$(font.base)
# Error
style.perl.1=$(colour.error)
# Comment
style.perl.2=$(colour.code.comment.box),$(font.code.comment.box)
# POD: = at beginning of line
style.perl.3=fore:#004000,back:#E0FFE0,$(font.text),eolfilled
# Number
style.perl.4=$(colour.number)
# Keyword
style.perl.5=$(colour.keyword)
# Double quoted string
style.perl.6=$(colour.string)
# Single quoted string
style.perl.7=$(colour.char)
# Symbols / Punctuation. Currently not used by LexPerl.
style.perl.8=$(colour.notused),$(font.notused)
# Preprocessor. Currently not used by LexPerl.
style.perl.9=$(colour.notused),$(font.notused)
# Operators
style.perl.10=$(colour.operator)
# Identifiers (functions, etc.)
style.perl.11=$(colour.keyword)
# Scalars: $var
style.perl.12=$(colour.text)
# Array: @var
style.perl.13=$(colour.text)
# Hash: %var
style.perl.14=$(colour.text)
# Symbol table: *var
style.perl.15=$(colour.text)
# Regex: /re/ or m{re}
style.perl.17=$(colour.string)
# Substitution: s/re/ore/
style.perl.18=$(colour.string)
# Long Quote (qq, qr, qw, qx) -- obsolete: replaced by qq, qx, qr, qw
style.perl.19=fore:#FFFF00,back:#8080A0
# Back Ticks
style.perl.20=$(style.perl.6),back:#90FFFF
# Data Section: __DATA__ or __END__ at beginning of line
style.perl.21=fore:#600000,back:#FFF0D8,eolfilled
# Here-doc (delimiter)
style.perl.22=fore:#DDD0DD
# Here-doc (single quoted, q)
style.perl.23=fore:#7F007F,back:#DDD0DD,eolfilled,notbold
# Here-doc (double quoted, qq)
style.perl.24=fore:#7F007F,back:#DDD0DD,eolfilled,bold
# Here-doc (back ticks, qx)
style.perl.25=fore:#7F007F,back:#DDD0DD,eolfilled,italics
# Single quoted string, generic
style.perl.26=fore:#7F007F,$(font.monospace),notbold
# qq = Double quoted string
style.perl.27=$(style.perl.6)
# qx = Back ticks
style.perl.28=$(style.perl.20)
# qr = Regex
style.perl.29=$(style.perl.17)
# qw = Array
style.perl.30=$(style.perl.13)
# POD: verbatim paragraphs
style.perl.31=fore:#004000,back:#C0FFC0,$(font.monospace),eolfilled
# subroutine prototype
style.perl.40=$(style.perl.10),italics
# format identifier
style.perl.41=fore:#C000C0,bold
# format body
style.perl.42=fore:#C000C0,back:#FFF0FF,eolfilled
# translation: tr{}{} y{}{}
style.perl.44=$(style.perl.18)

# Double quoted string (interpolated variable)
style.perl.43=$(colour.string)
# Regex: /re/ or m{re} (interpolated variable)
style.perl.54=$(style.perl.17),fore:#D00000,bold
# Substitution: s/re/ore/ (interpolated variable)
style.perl.55=$(style.perl.18),fore:#D00000,bold
# Back Ticks (interpolated variable)
style.perl.57=$(style.perl.20),fore:#D00000,bold
# Here-doc (double quoted, qq) (interpolated variable)
style.perl.61=$(style.perl.24),fore:#D00000,bold
# Here-doc (back ticks, qx) (interpolated variable)
style.perl.62=$(style.perl.61)
# qq = Double quoted string (interpolated variable)
style.perl.64=$(style.perl.43)
# qx = Back ticks (interpolated variable)
style.perl.65=$(style.perl.57)
# qr = Regex (interpolated variable)
style.perl.66=$(style.perl.54)



