# Scite documentation at http://www.scintilla.org/SciTEDoc.html
# Scite-Ru 2.23.89 documentation at http://scite-ru.googlecode.com/svn-history/r1638/trunk/pack/doc/SciTE-Ru_Kernel.html
# Scintillua documentation at http://code.google.com/p/scintillua/

# Press Ctrl + Numpad[*] to fold/unfold individual categories!
# Press Ctrl + Shift + Numpad[*] to fold/unfold all the categories at once!

[config]
# user session directory, used for saving sessions and by various extensions
scite.userhome=$(SciteDefaultHome)\user
import $(SciteDefaultHome)\user\settings
# enable per-project (parent directory) properties file SciTEDirectory.properties
properties.directory.enable=1


[Startup window sizes and visibility]
if PLAT_WIN
	position.left=0
	position.top=0
if PLAT_GTK
	position.left=5
	position.top=22
position.width=800
position.height=740
position.maximize=0
#position.tile=1
#full.screen.hides.menu=1
minimize.to.tray=0

[Behavior]
# allow only one scite instance
check.if.already.open=0
# enable multiple buffers
buffers=100
# don't quit scite when closing the last tab
quit.on.close.last=1
# check changed files upon scite activate
load.on.activate=1
# save changed files upon scite deactivate
save.on.deactivate=1
# preserve undo buffer upon file reload
reload.preserves.undo=1

# The save.on.timer property causes SciTE to save modified files whenever there have been no modifications for the number of seconds specified by the property. When set to 0, the default, this feature is disabled and files are not automatically saved.
#save.on.timer=20
#temp.files.sync.load=1

# If horizontal.scrollbar set to 0 then the edit pane's horizontal scrollbar is not displayed. If word wrap is activated it is also not shown
horizontal.scrollbar=1
# Document width assumed for scrolling
#horizontal.scroll.width=10000
# The horizontal scroll bar widths can automatically grow as needed to ensure all displayed lines can be fully scrolled (1)
#horizontal.scroll.width.tracking=0
# To stop the output pane from automatically scrolling, set output.scroll to 0. To have the output pane scroll and return back to the line of the executed command, set output.scroll to 1. If you want the output pane to scroll and remain at the bottom after execution, set output.scroll to 2.
output.scroll=0
# The vertical scroll range is normally set so that maximum scroll position has the last line at the bottom of the view. Set end.at.last.line to 0 to allow scrolling one page below the last line.
end.at.last.line=0

#output.horizontal.scrollbar=0
#output.horizontal.scroll.width=10000
#output.horizontal.scroll.width.tracking=0

# hide menu on full screen
full.screen.hides.menu=1
# save all files before running, not just the active one
save.all.for.build=1
# split vertical is better on wide screens
split.vertical=1
output.vertical.size=60
output.horizontal.size=200
# hide the output pane initially
output.initial.hide=1
# default syntax highlighting mode for new files
default.file.ext=.txt

[confirmations]
# save before exiting without(0) or with(1) confirmation
are.you.sure=1
# max unconfirmed file size to open
max.file.size=1024000
# no need to confirm auto-reloading
are.you.sure.on.reload=0
# save before running without confirmation
are.you.sure.for.build=0

[session]
# save opened files, recently closed files list, window position, bookmarks, code folding stati (1) or not
save.session=1
save.recent=1
save.position=1
session.bookmarks=1
session.folds=1
save.recent.max=100

[title]
# show full path in caption bar and buffer number
title.full.path=1
title.show.buffers=1

[tabbar]
# enable tabbar
tabbar.visible=1
if PLAT_WIN
    # These settings don't work with Linux or Mac OS X unfortunately
    # Setting this to 1 makes the tool bar larger and use larger icons
    toolbar.large=0
    # Setting tabbar.multiline uses multiple lines for the tab bar
    tabbar.multiline=1
# keep the tab bar even with one file on it (0) ir hide it (1)
tabbar.hide.one=1
tabbar.title.maxlength=20
# buffer ordering for Ctrl+T by buffer number
buffers.zorder.switching=0
tabbar.readonly.marker= [R]
# not needed, because middle click works
tabbar.tab.close.on.doubleclick=0
# create new tab next the current one (0) or at the end if tab bar (1) doesn't seem to work
buffers.new.position=1

[editor]
# less flicker but slower
buffered.draw=1
# There are several orders in which the text area may be drawn offering a trade-off between speed and allowing all pixels of text to be seen even when they overlap other elements. There may also be some flickering on some platforms with higher numbers of phases unless buffered drawing is turned on.
# In single phase drawing (phases.draw=0) each run of characters in one style is drawn along with its background. If a character overhangs the end of a run, such as in "V_" where the "V" is in a different style from the "_", then this can cause the right hand side of the "V" to be overdrawn by the background of the "_" which cuts it off.
# Two phase drawing (phases.draw=1) fixes this by drawing all the backgrounds of a line first and then drawing the text in transparent mode. Lines are drawn separately and no line will overlap another so any pixels that overlap into another line such as extreme ascenders and descenders on characters will be cut off.
# Multiple phase drawing (phases.draw=2) draws the whole area multiple times, once for each feature, building up the the appearance in layers or phases. The coloured backgrounds for all lines are drawn before any text and then all the text is drawn in transparent mode over this combined background without clipping text to the line boundaries. This allows extreme ascenders and decenders to overflow into the adjacent lines. This mode is incompatible with buffered.draw so will be treated as phases.draw=1 when bufferd.draw=1.
# The default is for drawing to be two phase.
# The two.phase.draw property was used before multiple phase drawing was added and should be replaced with phases.draw
phases.draw=1
#	two.phase.draw=1
# A large proportion of the time spent in the editor is used to lay out text prior to drawing it. This information often stays static between repaints so can be cached with these settings. There are four levels of caching. 0 is no caching, 1 caches the line that the caret is on, 2 caches the visible page as well as the caret, and 3 caches the whole document. The more that is cached, the greater the amount of memory used, with 3 using large amounts of memory, 7 times the size of the text in the document. However, level 3 dramatically speeds up dynamic wrapping by around 25 times on large source files so is a very good option to use when wrapping is turned on and memory is plentiful.
cache.layout=3
if PLAT_WIN
	technology=1
# 0	Default 1 Non-antialiased 2 Antialiased 3 LCD Optimized currently no effect for GTK+
if PLAT_MAC
	font.quality=3

# Sets the character to use to indicate control characters. If not set, control characters are shown as mnemonics
control.char.symbol=

[editor/highlighting]
# colors for scite lexers
theme.black=1
import colors
# colors for lpeg lexers
lexer.lpeg.color.theme=black
import lexers\lpeg

# When set to 1, all occurrences of the selected word are highlighted with the colour defined by highlight.current.word.colour. By default, this option is disabled. (See indicators.alpha and indicators.under)
highlight.current.word=1
# The option highlight.current.word.colour defines the colour of highlight. The default value is #A0A000. Overridden by highlight.current.word.indicator.
#highlight.current.word.colour=#00D040
# If set, defines the appearance of the current word highlight. This is a structured property with multiple attributes similar to:
highlight.current.word.indicator=style:roundbox,colour:#9a0698,under,outlinealpha:200,fillalpha:200
#highlight.current.word.indicator=style:roundbox,colour:#9a0698,under,outlinealpha:256,fillalpha:256
#If the option highlight.current.word.by.style is set, then only words with the same style are highlighted (e.g. if you select this word in a comment, then only occurrences of words in comments are selected).
highlight.current.word.by.style=1

[editor/edge]
# Indicates long lines. The default edge.mode, 0, does not indicate long lines. An edge.mode of 1 uses a vertical line to indicate the specified column and an edge.mode of 2 changes the background colour of characters beyond that column. For proportional fonts, an edge.mode of 2 is more useful than 1.
edge.mode=1
edge.column=120
# highlighting colour to use for text exceeding edge.column for edge.mode=2
edge.colour=#808080

[editor/whitespace]
# Makes SciTE start up with whitespace visible (1)
view.whitespace=0
# Hides visible whitespace inside indentation (0)
view.indentation.whitespace=0

[editor/indentation]
tabsize=4
indent.size=4
# if set to 0 tabulator will be replaced by tabsizes spaces
use.tabs=0
use.tabs.$(file.patterns.make)=1
# set indent.size and use.tabs according to the contents of the opened file!
indent.auto=0
# turn on automatic indentation
indent.automatic=1
indent.opening=0
indent.closing=0
# tab indents and backspace unindents, rather than inserting/deleting a character
tab.indents=1
backspace.unindents=0
# Displays dotted vertical lines within indentation white space every indent.size columns (1)
view.indentation.guides=0
# (1) display guides within real indentation whitespace only, 2 according to the next non-empty line (good for Python) or 3 according to both the next and previous non-empty lines (good for most languages)
view.indentation.examine=3
# (1) Highlights the indentation guide associated with a brace when that brace is highlighted
highlight.indentation.guides=1

[editor/eol]
view.eol=0
# line endings: same as in file or LF, strip trailing spaces, consistent
eol.mode=LF
eol.auto=1
# Strips trailing white spaces from the file while saving.
strip.trailing.spaces=1
# The global strip.trailing.spaces property can be overridden for files that match a pattern by using the file pattern forms
# trailing space in markdown means line break
strip.trailing.spaces.*.md=0
strip.trailing.spaces.*.diff=0
# temporary setting for pngwriter -.-
#strip.trailing.spaces.*.cc=0
ensure.consistent.line.ends=1
ensure.final.line.end=1

[editor/caret]
# Sets the rate at which the caret blinks. The value is the time in milliseconds that the caret is visible before it is switched to invisible. It then stays invisible for the same period before appearing again. A value of 0 stops the caret from blinking
caret.period=500
# Determines whether the caret can be moved into virtual space, that is, beyond the last character on a line. Set to 1 to allow virtual space when making a rectangular selection, 2 to allow the arrow keys or a mouse click to move the caret into virtual space, and 3 to allow both.
virtual.space=1
#caret.fore=#FF0000
#caret.additional.blinks=0
caret.width=1
# Sets the background colour and translucency used for line containing the caret. Translucency ranges from 0 for completely transparent to 255 for opaque with 256 being opaque and not using translucent drawing code which may be slower
caret.fore=#FFFFFF
caret.line.back=#151515
# when on margin, keep the view in sync with the caret vertically, but not horizontally
caret.policy.ystrict=1
caret.policy.xstrict=0
# caret "pushes" on the editor's top/bottom margins to scroll the view
# unfortunately, caret.policy.lines=0 behaves as =1
caret.policy.yslop=1
caret.policy.lines=0
caret.policy.yjumps=0
# caret "pushes" on the editor's left/right margins - ~300px to scroll the view
caret.policy.xslop=1
caret.policy.width=100
caret.policy.xjumps=1
caret.policy.xeven=1
caret.policy.yeven=1
# same policies for Find and Go commands
visible.policy.strict=1
visible.policy.slop=1
visible.policy.lines=4

[editor/wrap]
# If wrap set to 1 then the edit pane is dynamically line wrapped. If output.wrap set to 1 then the output pane is dynamically line wrapped. These options have a high performance cost which is proportional to the amount of text so should be turned off for large documents on slow machines.
wrap=1
output.wrap=1
# Chooses between word wrapping (1, the default) and character wrapping (2). Character wrapping is a better choice for Asian languages with no spaces between words.
wrap.style=1
# Flags to display markers at end and begin of wrapped lines for visual identify them. Set to 0 to not display markers (default). Set to 1 to display markers at end of wrapped lines, to 2 to display markers at begin of wrapped lines and to 3 to display markers at begin and end.
# Don't show flags, because missing line number is indicator enough
wrap.visual.flags=2
# Flags to set the location of the display markers (if enabled) near to text or near to border. Set to 0 to have begin and end markers near to border (default). Set to 1 to have end markers near text, to 2 to have begin markers near text and to 3 to have all markers near text.
wrap.visual.flags.location=3
# Wrapped sublines can be indented in various ways relative to the initial subline. Default mode 0 indents sublines to the left of window plus wrap.visual.startindent. Mode 1 aligns sublines to the first subline. Mode 2 aligns sublines to the first subline plus one more level of indentation.
wrap.indent.mode=1
# Sets the indention of continued wrapped lines to better visually identify the wrapping. Default is 0 (no indention). Note if wrap.visual.flags is 2 or 3 (begin marker displayed) the line is indented at least 1, even if wrap.visual.startindent is still 0.
wrap.visual.startindent=0
# This property changes the behaviour of the home and end keys when dynamic line wrapping is turned on. When set to 0 (the default), the Home and End keys will move the caret to the very beginning / end of the 'logical' line, whether or not the line is wrapped over multiple lines in the display. When this property is set to 1, the caret moves to the end of the current 'display' line if you press End once, or to the very end of the 'logical' line if you press End again. Likewise, the Home key moves first to the beginning of the 'display' line, then on to the very beginning of the line. In a pane where dynamic line-wrapping is not enabled, this setting has no effect.
wrap.aware.home.end.keys=0

[editor/selection]
# colors fitting to sable-theme http://killhellokitty.deviantart.com/art/Sable-3-14-31-03222015-507996540
# Sets the colours used for displaying selected text. If one of these is not set then that attribute is not changed for the selection. The default is to show the selection by changing the background to light grey and leaving the foreground the same as when it was not selected. When selection.layer is under text (1) or over text (2), selection.back may be an 8 digit number with translucency as the last two digits. On macOS, the system's selection background may be used when selection.back is set to empty.
selection.fore=#FFFFFFFF
selection.back=#9a0698C0
# Got removed in SciTE 5, instead .fore and .back are RGBA instead of RGB
#selection.alpha=256
# Sets the colours used for displaying additional selections when multiple selections are enabled or a rectangular selection is made.
selection.additional.fore=$(selection.fore)
selection.additional.back=$(selection.back)
#  Sets the colours used for displaying selections when another window holds the primary selection.
selection.secondary.fore=$(selection.fore)
selection.secondary.back=$(selection.back)
# Sets the colours used for displaying selections when the window is inactive because it does not have focus.
selection.inactive.fore=$(selection.fore)
selection.inactive.back=$(selection.back)

# Sets the layer for drawing the selection background: base opaque (0), under text (1), or over text (2).
selection.layer=1

# Sets whether switching to rectangular selection mode while making a selection with the mouse is allowed (1) or not (0). Default is 0.
selection.rectangular.switch.mouse=1
# Set selection.multiple to make multiple selections with the mouse by holding down the Ctrl key.
selection.multiple=1
# Set selection.additional.typing to 1. to allow typing, backspace and delete to affect all selections including each line of rectangular selections. When set to 0, typing only affects the main selection.
selection.additional.typing=1
selection.hide.on.deactivate=0
# Set selection.multipaste to 1 to paste at all selections. If set to 0, the paste will only be inserted at the last selection.
selection.multipaste=1

[editor/brace matching]
# Brace highlighting is a feature that shows the range of a brace when the caret is positioned immediately after it. It is especially useful when complex nested braces are used. The characters '(', ')', '[', ']', '{', and '}' are considered braces. The feature defaults to off (because it slows cursor movement) unless braces.check is set to 1. If braces.sloppy is set to 1 then if there is no brace before the caret then the character after the caret is checked.
braces.check=1
braces.sloppy=1
#The highlighting is performed by displaying the braces in style number 34 or in style number 35 if there is no matching brace. While this is a full style, to avoid partial display of the braces, it is best to make this style differ from the standard style of braces only in foreground and background colour. Only braces with style set to braces.lexer.style (which defaults to 0) are candidates for brace match highlighting.

[editor/folding]
# enable folding, and show lines below when collapsed.
fold=1
# The fold.symbols setting chooses between four ways of showing folding. Set to 0 (the default) for MacOS style arrows to indicate contracted (facing right) and expanded (facing down); 1 to display contracted folds with "+" and expanded with "-"; 2 for a flattened tree control with round headers and rounded joins; 3 for a flattened tree control with square headers.
fold.symbols=3
# Sets the width of the fold margin
fold.margin.width=10
# These two properties define the fold margin colour and fold margin highlight colour. If they are not defined (left commented out) the colours for the fold margin will default to a reasonable pair of colours. On Windows, the system colours are used to make the fold margin appear like the background of scroll bars. As an example, with fold.margin.colour=#FF0000 and fold.margin.highlight.colour=#0000FF, the fold margin is a mixture of red and blue.
#fold.margin.colour=
fold.margin.highlight.colour=#FF0000
#fold.highlight=1
#fold.highlight.colour=#00C0C0
# Automatically fold files as much as possible when loaded (1)
fold.on.open=0
# Not really documented ;) bit flags which may go away. 2, 4, 8, and 16 control drawing lines above and below folding lines if expanded or not expanded. Set to 64 to help debug folding by showing hexadecimal fold levels in margin.
fold.flags=16
# For HTML, XML, Lua and C++ and similar files, turning this option on leads to blank lines following the end of an element folding with that element. Defaults to on.
fold.compact=1
# Set to 1 to enable highlight for current folding block (smallest one that contains the caret). By default, it's disable. Note : The highlight is enabled only when fold.symbols equals to 2 (round headers) or 3 (square headers).
fold.highlight=0
# Define the colour of highlight. The colour by default is red (#FF0000).
fold.highlight.colour=#FF0000
fold.comment=1
fold.preprocessor=1


[editor/margins]
# SciTE is able to display a column of line numbers to the left of the selection margin. Setting line.margin.visible to 1 makes this column visible at startup. The line.margin.width property controls how much space is reserved for the line numbers, in terms of the number of digits that can be displayed. To specify that the margin should expand if needed to accommodate larger line numbers, add a '+' after the number of digits, e.g. line.margin.width=3+.
line.margin.visible=1
line.margin.width=3+
# Setting this to a number makes SciTE display a selection margin to the left of the text. The value is the number of pixels wide the selection margin should be. Line markers are displayed in the selection margin area.
margin.width=16
#There is a blank margin on both sides of the text. It is drawn in the background colour of default text. This defaults to one pixel for both left and right sides but may be altered with these settings.
#blank.margin.left=4
#blank.margin.right=4

[editor/charsets]
# To support a DBCS language such as Japanese, a code page can be set here. This ensures that double byte characters are always treated as a unit so the caret is never located between the two bytes of a double byte character.
# Internationalisation
# Setting code.page to 65001 starts Unicode mode and the document is treated as a sequence of characters expressed as UTF-8. Display is performed by converting to the platform's normal Unicode encoding first so characters from any language will be displayed. Correct glyphs may only be displayed if fonts are chosen that contain the appropriate glyphs. The Tahoma font contains a wide range of glyphs so may be a good choice.
# This property can not set a single byte character set.
# If output.code.page is set then it is used for the output pane which otherwise matches the edit pane.
code.page=65001
# ascii = 0, unicode = 65001
# Required for Unicode to work on GTK+:
#LC_CTYPE=en_US.UTF-8
#if PLAT_GTK
#	output.code.page=65001
#if PLAT_MAC
#	output.code.page=65001

# This setting allows changing the character set that is asked for when setting up fonts. Not all of the values will work on all platforms.
# All of these values except for 1251 and 1000 should work on OS X or Windows. On GTK+ Baltic, Turkish, Thai and Vietnamese will probably not work
# 1000 correctly recognizes deutsche Umlaute among others
character.set=1000


# detect BOM header
utf8.auto.check=2
# characters allowed in identifiers
chars.alpha=ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz
chars.numeric=0123456789
chars.accented=
word.characters.*=$(chars.alpha)$(chars.numeric)$(chars.accented)_

[editor/calltips]
# disable automatic autocompletion
autocompleteword.automatic=1
# don't auto-choose when the autocomplete list has only one element (0)
autocomplete.choose.single=0
autocomplete.*.ignorecase=1
calltip.*.ignorecase=1
