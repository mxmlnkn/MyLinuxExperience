indent.size.$(file.patterns.yaml)=2
use.tabs.$(file.patterns.yaml)=0

# YAML comment character
comment.block.yaml=#~

# YAML convertible values
keywords.$(file.patterns.yaml)=true false yes no

# YAML font styles
# default
style.yaml.0=$(colour.text)
# comment line
style.yaml.1=$(colour.code.comment)
# value identifier
style.yaml.2=$(colour.keyword)
# keyword value
style.yaml.3=$(colour.keyword)
# numerical value
style.yaml.4=$(colour.number)
# reference/repeating value
style.yaml.5=$(font.base),fore:#008888
# document delimiting line
style.yaml.6=$(font.comment),fore:#FFFFFF,bold,back:#000088,eolfilled
# text block marker
style.yaml.7=$(colour.string)
# syntax error marker
style.yaml.8=$(font.text),fore:#FFFFFF,italics,bold,back:#FF0000,eolfilled


############## Difference styles ##############

# Default
style.diff.0=$(colour.text)
# Comment (part before "diff ..." or "--- ..." and , Only in ..., Binary file...)
style.diff.1=fore:#007F00
# Command (diff ...)
style.diff.2=$(colour.text)
# Source file (--- ...) and Destination file (+++ ...)
style.diff.3=$(colour.text)
# Position setting (@@ ...)
style.diff.4=$(colour.keyword)
# Line removal (-...)
style.diff.5=fore:#a50000
# Line addition (+...)
style.diff.6=fore:#009500
# Line change (!...)
style.diff.7=fore:#7F7F7F


############## Markdown styles ##############

lexer.*.md=markdown
style.unknown=fore:#33FF00
# Normal
style.markdown.0=
# Special, e.g. end-of-line codes if enabled
style.markdown.1=
# STRONG **double asterisk**
style.markdown.2=$(colour.text),bold
# STRONG 2 (not used)
style.markdown.3=
# EM1 *single asterisk*
style.markdown.4=$(colour.text),bitalics
# EM2 _single underline_
style.markdown.5=$(colour.text),bitalics
# H1-H3 ## Hash signs ##
style.markdown.6=$(colour.keyword)
style.markdown.7=$(colour.keyword)
style.markdown.8=$(colour.keyword)
# H4
style.markdown.9=$(style.unknown),bold
# H5
style.markdown.10=$(style.unknown),bold
# H6
style.markdown.11=$(style.unknown),bold
# prechar (up to three indent spaces, eg for a second-level list)
style.markdown.12=fore:#7F007F
# list
style.markdown.13=fore:#33CC00
# list
style.markdown.14=$(style.unknown)
# BLOCKQUOTE
style.markdown.15=$(style.unknown)
# STRIKEOUT ~~double tilde~~ (apparently not in Markdown)
style.markdown.16=$(style.unknown)
# HRULE --- (three or more hyphens)
style.markdown.17=fore:#555555,$(font.monospace)
# LINK
style.markdown.18=$(colour.string)
# CODE `single backticks`
style.markdown.19=$(font.comment),$(font.monospace)
# CODE2 ``double backticks`` (quotes code containing a single backtick)
style.markdown.20=$(style.markdown.19)
# CODEBLOCK
style.markdown.21=
# COMMENT
style.markdown.22=
# OPTION
style.markdown.23=
# PREPROC
style.markdown.24=
# POSTPROC
style.markdown.25=


