#autocomplete.*.start.characters=.:

[editor/find and replace]

#find.in.directory=
#find.strip.incremental=1
#find.indicator.incremental=style:compositionthick,colour:#FFB700,under
#replace.strip.incremental=1
#strip.button.height=24

# Internal search always available with recursive capability so use in preference to external tool
#if PLAT_GTK
#   find.command=grep --line-number "$(find.what)" $(find.files)
find.files=*.*
# show button for replacing in all opened files (only with replace.use.strip=0)
find.replace.advanced=1
# don't search in files or directories starting with a dot
find.in.dot=0
# search using the panel instead of the dialog box
find.use.strip=1
# replace using the panel instead of the dialog box
replace.use.strip=1
# don't close the find dialog box automatically
if PLAT_WIN
    find.close.on.find=0
# return the cursor to original position when clicking "Replace All"
find.replace.return.to.start=1

# Set to 0 to prevent the Find in Files dialog from closing when "Find" pressed.
